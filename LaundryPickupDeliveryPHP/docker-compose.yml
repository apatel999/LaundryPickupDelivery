services:

  db:
    image: mysql:8.0
    container_name: laundryloop-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: LaundryLoopDb
    ports:
      - "3306:3306"
    volumes:
      - laundryloop-db:/var/lib/mysql          # persistent data
      - ./database/setup-database.sql:/docker-entrypoint-initdb.d/setup.sql  # auto-runs on first start
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5

