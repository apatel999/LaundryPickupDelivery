<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LaundryLoop — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --brand:       #3d2db5;
  --brand-dark:  #2c1f8f;
  --brand-mid:   #5b4dd4;
  --brand-light: #edeafd;
  --accent:      #f97316;
  --text:        #1a1830;
  --muted:       #6b6882;
  --border:      rgba(61,45,181,0.12);
  --surface:     #ffffff;
  --page:        #f4f3fb;
}

html, body { height: 100%; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--page);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-card {
  background: var(--surface);
  border-radius: 18px;
  border: 0.5px solid var(--border);
  box-shadow: 0 8px 30px rgba(61,45,181,0.10);
  padding: 40px 36px 36px;
  width: 100%;
  max-width: 380px;
  text-align: center;
}

.logo {
  font-family: 'Fraunces', serif;
  font-size: 28px;
  font-weight: 600;
  color: var(--brand);
  margin-bottom: 6px;
}
.logo em { color: var(--accent); font-style: normal; }

.subtitle {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 28px;
}

.form-group {
  text-align: left;
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.4px;
  margin-bottom: 6px;
}

.form-group input {
  width: 100%;
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  font-size: 14px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  color: var(--text);
  background: var(--page);
  outline: none;
  transition: border-color 0.15s;
}
.form-group input:focus {
  border-color: var(--brand-mid);
  box-shadow: 0 0 0 3px rgba(91,77,212,0.12);
}

.login-btn {
  width: 100%;
  padding: 11px;
  border: none;
  border-radius: 10px;
  background: var(--brand);
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  font-family: 'Plus Jakarta Sans', sans-serif;
  cursor: pointer;
  transition: background 0.15s;
  margin-top: 8px;
}
.login-btn:hover { background: var(--brand-dark); }
.login-btn:disabled { opacity: 0.6; cursor: not-allowed; }

.error-msg {
  background: #fef2f2;
  color: #991b1b;
  font-size: 13px;
  padding: 8px 14px;
  border-radius: 8px;
  margin-bottom: 16px;
  display: none;
}
.error-msg.show { display: block; }
</style>
</head>
<body>

<div class="login-card">
  <div class="logo">laundry<em>loop</em></div>
  <div class="subtitle">Admin Dashboard Login</div>

  <div class="error-msg" id="error-msg"></div>

  <form id="login-form" onsubmit="return handleLogin(event)">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required autofocus/>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required/>
    </div>
    <button type="submit" class="login-btn" id="login-btn">Sign In</button>
  </form>
</div>

<script>
async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('error-msg');
  errEl.classList.remove('show');
  btn.disabled = true;
  btn.textContent = 'Signing in…';

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });

    const data = await res.json();

    if (!res.ok) {
      errEl.textContent = data.error || 'Login failed';
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Sign In';
      return false;
    }

    // Redirect to admin dashboard
    window.location.href = 'laundryloop-admin.html';
  } catch (err) {
    errEl.textContent = 'Could not connect to server';
    errEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
  return false;
}
</script>
</body>
</html>
